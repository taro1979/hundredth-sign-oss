<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メンテナンス中 | Hundredth Sign</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: white;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }
    .desc { color: #94a3b8; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1rem; }
    .badge {
      display: inline-block;
      background: #059669; color: white;
      border-radius: 9999px; padding: 0.25rem 1rem;
      font-size: 0.8rem; font-weight: 600; margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    .contact { font-size: 0.85rem; color: #64748b; margin-top: 2rem; }
    .contact a { color: #34d399; text-decoration: none; }
    .lang-toggle {
      margin-top: 2rem;
      font-size: 0.75rem;
    }
    .lang-toggle button {
      background: none; border: 1px solid #334155; color: #94a3b8;
      border-radius: 0.375rem; padding: 0.25rem 0.75rem; cursor: pointer;
      margin: 0 0.25rem; font-size: 0.75rem; transition: all 0.2s;
    }
    .lang-toggle button:hover, .lang-toggle button.active {
      background: #1e293b; color: white; border-color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <span class="badge" id="badge">メンテナンス中</span>
    <h1 id="title">ただいまメンテナンス中です</h1>
    <p class="desc" id="desc">
      システムの改善のため、現在サービスを一時停止しています。<br />
      ご不便をおかけして申し訳ありません。<br />
      しばらくしてから再度アクセスしてください。
    </p>
    <p class="contact" id="contact">
      お急ぎの場合は <a href="mailto:support@hundredthsign.com">support@hundredthsign.com</a> までご連絡ください。
    </p>
    <div class="lang-toggle">
      <button class="active" onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('en')">English</button>
    </div>
  </div>
  <script>
    const strings = {
      ja: {
        badge: "メンテナンス中",
        title: "ただいまメンテナンス中です",
        desc: "システムの改善のため、現在サービスを一時停止しています。<br>ご不便をおかけして申し訳ありません。<br>しばらくしてから再度アクセスしてください。",
        contact: 'お急ぎの場合は <a href="mailto:support@hundredthsign.com">support@hundredthsign.com</a> までご連絡ください。',
        lang: "ja",
      },
      en: {
        badge: "Under Maintenance",
        title: "We'll be back soon",
        desc: "We're performing scheduled maintenance to improve our service.<br>We apologize for the inconvenience.<br>Please try again in a little while.",
        contact: 'For urgent matters, please contact <a href="mailto:support@hundredthsign.com">support@hundredthsign.com</a>.',
        lang: "en",
      },
    };
    function setLang(lang) {
      const s = strings[lang];
      document.getElementById("badge").textContent = s.badge;
      document.getElementById("title").textContent = s.title;
      document.getElementById("desc").innerHTML = s.desc;
      document.getElementById("contact").innerHTML = s.contact;
      document.documentElement.lang = s.lang;
      document.querySelectorAll(".lang-toggle button").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && lang === "ja") || (i === 1 && lang === "en"));
      });
    }
  </script>
</body>
</html>
