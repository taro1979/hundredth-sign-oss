name: Feature request
description: Propose a source-available product or operator improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or operational need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Product boundary
      description: Which source-available area is affected?
      options:
        - Self-hosted operation
        - Signing workflow
        - Internal approval
        - Audit and compliance
        - Integration API or CLI
        - Documentation
        - Other
    validations:
      required: true
